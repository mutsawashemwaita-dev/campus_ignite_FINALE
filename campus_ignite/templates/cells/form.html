{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="ci-form-card">
      <form method="post">
        {% csrf_token %}
        <div class="ci-form-section mb-4">
          <h6><i class="fas fa-people-group me-1"></i>Cell Details</h6>
          {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
          </div>
          {% endfor %}
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-ci px-4">Save</button>
          <a href="{% url 'cell_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
