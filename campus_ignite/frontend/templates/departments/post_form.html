{% extends 'base.html' %}
{% block title %}New Post{% endblock %}
{% block page_title %}New Post – {{ dept.name }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="mb-3"><a href="{% url 'department_detail' dept.pk %}" class="text-muted small"><i class="fas fa-arrow-left me-1"></i>Back</a></div>
    <div class="ci-form-card">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Title <span class="text-danger">*</span></label>
          <input type="text" name="title" class="form-control" placeholder="Post title or announcement heading">
        </div>
        <div class="mb-3">
          <label class="form-label">Content <span class="text-danger">*</span></label>
          <textarea name="content" class="form-control" rows="6" placeholder="Write your post, announcement or update..."></textarea>
        </div>
        <div class="mb-4 form-check">
          <input type="checkbox" name="is_pinned" class="form-check-input" id="is_pinned">
          <label class="form-check-label" for="is_pinned">Pin this post to the top</label>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-ci px-4"><i class="fas fa-paper-plane me-2"></i>Publish Post</button>
          <a href="{% url 'department_detail' dept.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
