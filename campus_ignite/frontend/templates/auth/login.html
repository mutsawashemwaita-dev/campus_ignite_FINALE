{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Campus Ignite</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="{% static 'css/campus_ignite.css' %}" rel="stylesheet">
</head>
<body>
<div class="ci-login-bg d-flex align-items-center justify-content-center">
  <div class="ci-login-card card border-0 shadow-lg">
    <!-- Header -->
    <div style="background:var(--ci-primary);padding:2rem 1.5rem 1.5rem;text-align:center;">
      <div style="width:64px;height:64px;background:rgba(200,169,81,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;">
        <i class="fas fa-fire fa-2x" style="color:var(--ci-accent);"></i>
      </div>
      <h4 style="color:#fff;font-weight:700;margin:0;">Campus Ignite</h4>
      <p style="color:rgba(255,255,255,.55);font-size:.8rem;margin:.25rem 0 0;">Campus Christian Institution</p>
    </div>
    <!-- Form -->
    <div class="card-body p-4">
      <p class="text-center text-muted mb-4" style="font-size:.9rem;">Sign in to your account</p>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold" style="color:var(--ci-primary);font-size:.85rem;">
            <i class="fas fa-user me-1"></i> Username
          </label>
          <input type="text" name="username" class="form-control" placeholder="Enter your username" autofocus
                 value="{{ form.username.value|default:'' }}">
          {% if form.username.errors %}
            <div class="text-danger small mt-1">{{ form.username.errors.0 }}</div>
          {% endif %}
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold" style="color:var(--ci-primary);font-size:.85rem;">
            <i class="fas fa-lock me-1"></i> Password
          </label>
          <div class="input-group">
            <input type="password" name="password" id="passwordField" class="form-control" placeholder="Enter your password">
            <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()">
              <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        {% if form.non_field_errors %}
          <div class="alert alert-danger py-2 small">
            <i class="fas fa-exclamation-circle me-1"></i> {{ form.non_field_errors.0 }}
          </div>
        {% endif %}
        <button type="submit" class="btn btn-ci w-100 fw-semibold py-2">
          <i class="fas fa-sign-in-alt me-2"></i>Sign In
        </button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd() {
  const f = document.getElementById('passwordField');
  const i = document.getElementById('eyeIcon');
  f.type = f.type === 'password' ? 'text' : 'password';
  i.className = f.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
</script>
</body>
</html>
