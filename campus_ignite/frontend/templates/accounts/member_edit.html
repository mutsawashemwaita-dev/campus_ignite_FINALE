{% extends 'base.html' %}
{% block title %}Edit Member{% endblock %}
{% block page_title %}Edit Member{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="mb-3"><a href="{% url 'user_list' %}" class="text-muted small"><i class="fas fa-arrow-left me-1"></i>Back</a></div>
    <div class="ci-form-card">
      <form method="post">
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" name="first_name" class="form-control" value="{{ profile.first_name }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" name="last_name" class="form-control" value="{{ profile.last_name }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" value="{{ profile.email }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control" value="{{ profile.phone }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Birthday <small class="text-muted">(shows in Hospitality)</small></label>
            <input type="date" name="birthday" class="form-control"
                   value="{{ profile.birthday|date:'Y-m-d'|default:'' }}">
          </div>
          <div class="col-12">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control" rows="2">{{ profile.notes }}</textarea>
          </div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-ci px-4">Save</button>
          <a href="{% url 'user_list' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
