services:
  - type: web
    name: campus-ignite
    runtime: python
    rootDir: campus_ignite/backend

    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate

    startCommand: gunicorn campus_ignite_project.wsgi:application

    envVars:
      - key: SECRET_KEY
        sync: false

      - key: DEBUG
        value: "False"

      - key: DATABASE_URL
        sync: false